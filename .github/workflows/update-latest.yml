name: Update latest network info

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect latest info
        run: npm run update:data
        env:
          LATEST_SOURCES_JSON: ${{ secrets.LATEST_SOURCES_JSON }}

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/update-log.json
          git diff --cached --quiet || git commit -m "chore: update latest network info"
          git push
